apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: myapp
  name: {{ .Values.name }} 
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        name: myapp
        args:
        - /bin/sh
        - -c
        - tail -f /dev/null
# --- Volume Mounts ---
        volumeMounts:
        {{- range .Values.configmaps }}
        - name: config-volume-{{ . }}
          mountPath: /etc/config/{{ . }}
        {{- end }}
        - name: secret-volume
          readOnly: true
          mountPath: "/etc/secret-volume"
      # --- Volumes ---
      volumes:
      {{- range .Values.configmaps }}
      {{- $configmapname := printf "%s-%s" $.Values.name . }}
      - name: config-volume-{{ . }}
        configMap:
          name: {{ $configmapname }}
      {{- end }}
      - name: secret-volume
        secret:
          secretName: dotfile-secret
