apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: myapp
  name: {{ .Values.name }} 
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        name: myapp
        args:
        - /bin/sh
        - -c
        - tail -f /dev/null
# --- Volume Mounts ---
        volumeMounts:
        - name: config-volume
          mountPath: /etc/config # Your ConfigMap keys will appear as files in this directory
      # --- Volumes ---
      {{ $configmapname = printf   "%s-%s" $.Values.name "configmap" }} 
      volumes:
      - name: config-volume
        configMap:
          name: {{ $configmapname }} # References the ConfigMap name precisely
