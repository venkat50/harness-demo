apiVersion: v1
kind: Service
metadata:
  name: myservice
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
  labels:
    app: myapp
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: myapp
    harness.io/color: blue
